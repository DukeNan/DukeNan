name: Build README

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        users: actions/checkout@v2
      - name: Set up Python 3.8.6
        uses: actions/setup-python@v2
        with:
            python-version: '3.8.6'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python3 updaye.py
      - name: Update README
        run: |
          sh deploy.sh
